name: Deploy to GitHub Pages

# Deployt die statische Seite automatisch nach jedem Push auf main (also nach jedem Merge).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Rechte, die das GITHUB_TOKEN für das Pages-Deployment braucht.
permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein Deployment gleichzeitig; laufende werden nicht abgebrochen.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        # Aktiviert Pages automatisch beim ersten Lauf (Source = GitHub Actions).
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Das Spiel besteht aus statischen Dateien im Repo-Root.
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
